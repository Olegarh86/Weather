<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign In</title>
    <link rel="stylesheet" th:href="@{/resources/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign In</h2>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12" th:object="${userSignInDto}">
            <div class="alert alert-danger" role="alert" th:if="${#fields.hasErrors('*')}">
                Invalid username or password.
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <form method="POST" th:object="${userSignInDto}" th:action="@{/weather/users/login}" class="mt-4">
                <div class="mb-3">
                    <label th:for="login" class="form-label">Username</label>
                    <div class="input-group has-validation">
                        <input type="text" class="form-control is-invalid" th:field="*{login}" required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('login')}" th:errors="*{login}">
                            Invalid login.
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label th:for="password" class="form-label">Password</label>
                    <div class="input-group has-validation">
                        <input type="password" class="form-control is-invalid" th:field="*{password}" required/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                            Invalid password.
                        </div>
                    </div>
                </div>

                <input type="hidden" name="redirect_to" value="/weather/users/index"/>

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
                <p class="mt-2 text-center">Don't have an account? <a th:href="@{/weather/users/sign-up}">Sign up here</a>
                </p>
            </form>
        </div>
    </div>
</div>

</body>
</html>

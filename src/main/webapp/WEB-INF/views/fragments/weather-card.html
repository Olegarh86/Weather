<div th:fragment="weather-card(location)" th:object="${location}" class="card h-100 position-relative weather-card">
    <form class="position-absolute weather-card-delete-form"
          method="POST"
          th:action="@{/weather/users/locations/delete}">
        <input name="latitude"
               th:value="${location.latitude}"
               type="hidden">
        <input name="longitude"
               th:value="${location.longitude}"
               type="hidden">
        <button aria-label="Delete"
                class="btn-close"
                type="submit">

        </button>
    </form>
    <img alt="Weather icon"
         class="card-img-top img-fluid"
         th:src="@{|/resources/images/icons/${location.icon}.png|}">
    <div class="card-body d-flex flex-column">
        <h1 class="card-text"
            th:text="|${location.temp} °C|">
            Temperature °C
        </h1>
        <h3 class="card-title"
            th:text="|${location.name}, ${location.country}|">
            City, Country
        </h3>
        <p class="card-text mb-1"
           th:text="|Feels like: ${location.feelsLike} °C. ${location.description}|">
            Feels like: °C
        </p>
        <p class="card-text mb-1"
           th:text="|Humidity: ${location.humidity}%|">
            Humidity: %
        </p>
        <p class="card-text mb-1"
           th:text="|Latitude: ${location.latitude}|">

        </p>
        <p class="card-text mb-1"
           th:text="|Longitude: ${location.longitude}|">

        </p>
    </div>
</div>

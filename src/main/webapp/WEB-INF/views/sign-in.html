<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign In</title>
    <link rel="stylesheet" th:href="@{/resources/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign In</h2>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12"><!--"@{/users/{id}(id=${weatherUser.getId()})}"-->
            <form method="POST" th:object="${userDto}" th:action="@{/weather/users/login}" class="mt-4">
                <div class="mb-3">
                    <label th:for="login" class="form-label">Username</label>
                    <input type="text" class="form-control" th:field="*{login}" minlength="2" maxlength="20" required/>
                </div>
                <div class="mb-3">
                    <label th:for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}" minlength="8" maxlength="64"
                           required/>

                    <input type="hidden" name="redirect_to" value="/weather/users/index"/>

                    <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
                    <p class="mt-2 text-center">Don't have an account?
                        <a th:href="@{/weather/users/sign-up}">Sign up here</a>
                    </p>
            </form>
        </div>
    </div>
</div>

</body>
</html>

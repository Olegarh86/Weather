<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign Up</h2>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <form method="POST" th:action="@{/weather/users}" th:object="${userSignUpDto}" class="mt-4">
                <div class="mb-3">
                    <label th:for="username" class="form-label">Username</label>
                    <input type="text" th:field="*{login}" class="form-control" minlength="2" maxlength="20" required/>
                </div>
                <div class="mb-3">
                    <label th:for="password" class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" minlength="8" maxlength="64"
                           required/>
                </div>
                <div class="mb-3">
                    <label th:for="repeat-password" class="form-label">Repeat password</label>
                    <input type="password" th:field="*{passwordConfirm}" class="form-control" minlength="8"
                           maxlength="64" required/>
                </div>

                <input type="hidden" name="redirect_to" value="/weather/users/sign-in"/>

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
                <p class="mt-2 text-center">Already have an account?
                    <a th:href="@{/weather/users/sign-in}">Sign in here</a>
                </p>
            </form>
        </div>
    </div>
</div>

</body>
</html>
